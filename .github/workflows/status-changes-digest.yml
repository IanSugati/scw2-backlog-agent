name: Status Changes Digest

on:
  schedule:
    - cron: "0 */2 * * 1-5"   # Every 2 hours, weekdays
  workflow_dispatch:

concurrency:
  group: status-changes-digest
  cancel-in-progress: true

jobs:
  status-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Env sanity (no values printed)
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PRODUCT_SPRINT_WEBHOOK: ${{ secrets.PRODUCT_SPRINT_WEBHOOK }}
        run: |
          set -e
          echo "[env] JIRA_BASE_URL=$([ -n "$JIRA_BASE_URL" ] && echo SET || echo MISSING)"
          echo "[env] JIRA_EMAIL=$([ -n "$JIRA_EMAIL" ] && echo SET || echo MISSING)"
          echo "[env] JIRA_API_TOKEN=$([ -n "$JIRA_API_TOKEN" ] && echo SET || echo MISSING)"
          echo "[env] PRODUCT_SPRINT_WEBHOOK=$([ -n "$PRODUCT_SPRINT_WEBHOOK" ] && echo SET || echo MISSING)"

      - name: Run Status Changes Digest
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PRODUCT_SPRINT_WEBHOOK: ${{ secrets.PRODUCT_SPRINT_WEBHOOK }}
        run: python status_changes_digest.py
