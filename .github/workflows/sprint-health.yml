name: Sprint Health Digest

on:
  schedule:
    - cron: "0 9 * * 1-5"   # Weekdays 09:00 UTC
  workflow_dispatch:

# Prevent overlapping runs (helps reduce Jira rate-limit / flaky HTTP issues)
concurrency:
  group: sprint-health-digest
  cancel-in-progress: true

jobs:
  sprint-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Env sanity (no values printed)
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CHAT_WEBHOOK_URL: ${{ secrets.CHAT_WEBHOOK_URL }}
          SPRINT_ANCHOR_DATE: ${{ secrets.SPRINT_ANCHOR_DATE }}
          JIRA_STORY_POINTS_FIELD: ${{ secrets.JIRA_STORY_POINTS_FIELD }}
        run: |
          set -e
          echo "[env] JIRA_BASE_URL=$([ -n "$JIRA_BASE_URL" ] && echo SET || echo MISSING)"
          echo "[env] JIRA_EMAIL=$([ -n "$JIRA_EMAIL" ] && echo SET || echo MISSING)"
          echo "[env] JIRA_API_TOKEN=$([ -n "$JIRA_API_TOKEN" ] && echo SET || echo MISSING)"
          echo "[env] CHAT_WEBHOOK_URL=$([ -n "$CHAT_WEBHOOK_URL" ] && echo SET || echo MISSING)"
          echo "[env] SPRINT_ANCHOR_DATE=$([ -n "$SPRINT_ANCHOR_DATE" ] && echo SET || echo MISSING)"
          echo "[env] JIRA_STORY_POINTS_FIELD=$([ -n "$JIRA_STORY_POINTS_FIELD" ] && echo SET || echo MISSING)"

      - name: Run Sprint Health Digest
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CHAT_WEBHOOK_URL: ${{ secrets.CHAT_WEBHOOK_URL }}
          SPRINT_ANCHOR_DATE: ${{ secrets.SPRINT_ANCHOR_DATE }}
          JIRA_STORY_POINTS_FIELD: ${{ secrets.JIRA_STORY_POINTS_FIELD }}
        run: python sprint_health_digest.py
