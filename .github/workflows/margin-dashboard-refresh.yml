name: Margin Dashboard Refresh

on:
  schedule:
    # Every 12 hours at midday and midnight UTC
    # (BST = UTC+1, so this runs at 1pm and 1am BST in summer,
    #  12pm and 12am GMT in winter)
    - cron: "0 0,12 * * *"
  workflow_dispatch: {}  # Manual trigger button in GitHub Actions

jobs:
  refresh:
    runs-on: ubuntu-latest

    # Grant write permission so the Action can commit and push
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run margin refresh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          python margin_refresh.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if data.json actually changed
          git diff --cached --quiet && echo "No changes to commit" || \
            (git commit -m "chore: refresh margin dashboard data [$(date -u +'%Y-%m-%d %H:%M UTC')]" && git push)
