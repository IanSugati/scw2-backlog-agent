name: Standup Digest

on:
  schedule:
    - cron: "0 8 * * 1-5"   # Weekdays 08:00 UTC (8am GMT / 9am BST)
  workflow_dispatch:

jobs:
  standup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Standup Digest
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

          STAND_UP: ${{ secrets.STAND_UP }}

          ANDY_STANDUP: ${{ secrets.ANDY_STANDUP }}

          SPRINT_ANCHOR_DATE: ${{ secrets.SPRINT_ANCHOR_DATE }}

          JIRA_STORY_POINTS_FIELD: ${{ secrets.JIRA_STORY_POINTS_FIELD }}

        run: python standup_digest.py
