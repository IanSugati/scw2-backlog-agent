name: Standup Digest

on:
  schedule:
    - cron: "0 8,9 * * 1-5"  # runs twice to survive UK DST; script posts at 9am London
  workflow_dispatch:

jobs:
  standup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run digest
        run: python standup_digest.py
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          STAND_UP: ${{ secrets.STAND_UP }}
          # Allow manual runs to post immediately (schedule runs still protected by the script's 9am check)
          ENFORCE_9AM_LONDON: "false"
