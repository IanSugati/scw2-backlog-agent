name: Standup Digest

on:
  schedule:
    - cron: "0 9 * * 1-5"   # Weekdays 09:00 UTC
  workflow_dispatch:

jobs:
  standup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Standup Digest
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

          STAND_UP: ${{ secrets.STAND_UP }}

          ANDY_STANDUP: ${{ secrets.ANDY_STANDUP }}

          SPRINT_ANCHOR_DATE: ${{ secrets.SPRINT_ANCHOR_DATE }}

          # Optional (only if used in script)
          # ENFORCE_9AM_LONDON: "true"
          # UPCOMING_DAYS: "2"
          # JIRA_STORY_POINTS_FIELD: ${{ secrets.JIRA_STORY_POINTS_FIELD }}
          # JIRA_START_DATE_FIELD: ${{ secrets.JIRA_START_DATE_FIELD }}

        run: python standup_digest.py
