name: Standup Digest

on:
  schedule:
    # 09:00 UTC (adjust later if you want DST precision)
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

jobs:
  standup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Standup Digest
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          STAND_UP: ${{ secrets.STAND_UP }}

          AT_API_TOKEN: ${{ secrets.AT_API_TOKEN }}
          AT_USERNAME_ANDY: ${{ secrets.AT_USERNAME_ANDY }}

          # NEW: sprint capacity anchor date (YYYY-MM-DD)
          SPRINT_ANCHOR_DATE: ${{ secrets.SPRINT_ANCHOR_DATE }}

          # Optional (only needed if your instance uses a different SP field id)
          # JIRA_STORY_POINTS_FIELD: ${{ secrets.JIRA_STORY_POINTS_FIELD }}

        run: python standup_digest.py
