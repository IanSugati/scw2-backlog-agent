name: Standup Digest

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 8,9 * * 1-5"

  workflow_dispatch:

jobs:
  standup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run digest
        run: python standup_digest.py
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          STAND_UP: ${{ secrets.STAND_UP }}
