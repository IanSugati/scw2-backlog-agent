name: Tickets Weekly Worklog Digest

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 17 * * 1-5"  # 17:00 UTC Mon–Fri (UK is UTC or UTC+1 depending on DST)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run timelog digest
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY_TICKETS: ${{ secrets.JIRA_PROJECT_KEY_TICKETS }}
          TICKETS_CHAT_WEBHOOK_URL: ${{ secrets.TICKETS_CHAT_WEBHOOK_URL }}
          TIMELOG_LIST_LIMIT: "30"
        run: |
          python tickets_timelog_digest.py
